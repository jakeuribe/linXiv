<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="graph.css" />
    <script src="cytoscape.min.js"></script>
</head>
<body>
    <div id="cy"></div>

    <div id="controls">
        <div id="controls-header">
            <span>Layout</span>
            <button id="controls-toggle">▼</button>
        </div>
        <div id="controls-body">
            <div class="control-section-title">Forces</div>
            <div class="control-row">
                <label>Gravity</label>
                <input type="range" id="gravity" min="0" max="100" step="1" value="15" />
                <span class="val" id="gravityVal">15</span>
            </div>
            <div class="control-row">
                <label>Repulsion</label>
                <input type="range" id="repulsion" min="100" max="10000" step="100" value="4500" />
                <span class="val" id="repulsionVal">4500</span>
            </div>
            <div class="control-row">
                <label>Edge length</label>
                <input type="range" id="edgeLength" min="10" max="300" step="5" value="80" />
                <span class="val" id="edgeLengthVal">80</span>
            </div>
            <div class="control-row">
                <label>Elasticity</label>
                <input type="range" id="edgeElasticity" min="0" max="1" step="0.01" value="0.45" />
                <span class="val" id="edgeElasticityVal">0.45</span>
            </div>
            <div class="control-row">
                <button id="relayout-btn" style="width:100%;padding:4px;">Re-run layout</button>
            </div>
        </div>
    </div>

    <script src="graph.js"></script>
</body>
</html>
